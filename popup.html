<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #15202b;
      color: #e7e9ea;
      margin: 0;
    }

    /* ヘッダー */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2f3336;
    }
    .header h2 { margin: 0; font-size: 15px; color: #1d9bf0; flex: 1; }
    .version { font-size: 10px; color: #536471; }

    /* 有効/無効トグル行 */
    .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .row-label { font-size: 13px; color: #e7e9ea; }

    /* トグルスイッチ */
    .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; background: #2f3336;
      border-radius: 24px; cursor: pointer; transition: background 0.25s;
    }
    .toggle-track::before {
      content: ''; position: absolute; width: 18px; height: 18px;
      left: 3px; top: 3px; background: #536471; border-radius: 50%;
      transition: transform 0.25s, background 0.25s;
    }
    .toggle input:checked + .toggle-track { background: #1d9bf0; }
    .toggle input:checked + .toggle-track::before { transform: translateX(20px); background: white; }

    /* 閾値セクション */
    .section-title { font-size: 11px; color: #536471; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .threshold-section { background: #1e2732; border-radius: 10px; padding: 12px; margin-bottom: 12px; }

    /* レベルバッジ */
    .level-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .level-badge { font-size: 12px; font-weight: bold; padding: 3px 12px; border-radius: 20px; min-width: 68px; text-align: center; transition: background 0.2s, color 0.2s; }
    .level-badge.strict  { background: #4a1942; color: #e94560; }
    .level-badge.balance { background: #1a3a4a; color: #1d9bf0; }
    .level-badge.loose   { background: #1a3320; color: #4caf50; }
    .threshold-pct { font-size: 22px; font-weight: bold; color: #e7e9ea; }

    /* スライダー */
    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 4px; border-radius: 4px;
      background: #2f3336; outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 18px; height: 18px; border-radius: 50%; background: #1d9bf0;
      cursor: pointer; box-shadow: 0 0 4px rgba(29,155,240,0.5); transition: box-shadow 0.2s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { box-shadow: 0 0 8px rgba(29,155,240,0.8); }

    .slider-labels { display: flex; justify-content: space-between; font-size: 10px; color: #536471; margin-top: 6px; }
    .level-desc { font-size: 11px; color: #8b98a5; margin-top: 10px; min-height: 14px; }

    /* ステータス */
    .status-bar {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-size: 12px; color: #536471; padding-top: 10px; border-top: 1px solid #2f3336;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #536471; flex-shrink: 0; transition: background 0.3s; }
    .status-dot.active { background: #4caf50; box-shadow: 0 0 4px #4caf5088; }
    #statusText { transition: color 0.3s; }
    #statusText.active { color: #4caf50; }

    /* 保存トースト */
    #toast {
      position: fixed; bottom: 12px; left: 50%;
      transform: translateX(-50%) translateY(40px);
      background: #1d9bf0; color: white; font-size: 11px;
      padding: 5px 14px; border-radius: 20px; opacity: 0;
      transition: opacity 0.2s, transform 0.2s; pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="header">
    <h2>🛡️ NSFW Guardian</h2>
    <span class="version">v2.0.0</span>
  </div>

  <div class="row">
    <span class="row-label">フィルタリング</span>
    <label class="toggle">
      <input type="checkbox" id="enabledToggle" checked>
      <span class="toggle-track"></span>
    </label>
  </div>

  <div class="section-title">感度設定</div>
  <div class="threshold-section">
    <div class="level-row">
      <span class="level-badge strict" id="levelBadge">厳しめ</span>
      <span class="threshold-pct" id="thresholdVal">30%</span>
    </div>
    <input type="range" id="thresholdRange" min="0.30" max="0.90" step="0.05" value="0.30">
    <div class="slider-labels">
      <span>厳しめ</span>
      <span>バランス</span>
      <span>緩め</span>
    </div>
    <div class="level-desc" id="levelDesc">水着・露出度の高い画像もブロックします</div>
  </div>

  <div class="status-bar">
    <div class="status-dot active" id="statusDot"></div>
    <span id="statusText" class="active">動作中</span>
  </div>

  <div id="toast">保存しました ✓</div>

  <script src="popup.js"></script>
</body>
</html>
